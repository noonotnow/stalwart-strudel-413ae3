    function getShanghaiDateString(){
      var formatter = new Intl.DateTimeFormat('zh-CN', {
        timeZone: 'Asia/Shanghai',
        year: 'numeric',
        month: '2-digit',
        day: '2-digit'
      });
      var parts = formatter.formatToParts(new Date());
      var yyyy = parts.find(function(p){ return p.type === 'year'; })?.value;
      var mm = parts.find(function(p){ return p.type === 'month'; })?.value;
      var dd = parts.find(function(p){ return p.type === 'day'; })?.value;
      if(!yyyy || !mm || !dd){ throw new Error('Could not format Asia/Shanghai date'); }
      return yyyy + '-' + mm + '-' + dd;
    }

    function hashDateString(str){
      var hash = 0;
      for(var i=0;i<str.length;i++){
        hash = (hash << 5) - hash + str.charCodeAt(i);
        hash |= 0;
      }
      return hash >>> 0;
    }

      if(!actor || !actor.vibes || !actor.vibes.length){ return null; }
      var vIdx = Math.floor(seed / ACTOR_PACKS.length) % actor.vibes.length;
      return { aIdx:aIdx, vIdx:vIdx, seed:seed, date:today };
    }

    let previewRequestId = 0;

    // Shared fetch: hits the preview-search netlify function, which already runs the
    // hidden brave -> serpapi fallback ladder and returns filtered, ad/commerce-free
    // results. Callers just get back a plain { results, provider } and decide what
    // to do with it (render inline, or evaluate as a candidate batch for the daily grid).
    async function fetchPreviewData(query) {
      const resp = await fetch(
        `/.netlify/functions/preview-search?q=${encodeURIComponent(query)}`
      );
      if (!resp.ok) throw new Error("Preview request failed");
      const data = await resp.json();
      return { results: Array.isArray(data.results) ? data.results : [], provider: data.provider };
    }

    // Renders a result list into a preview-image-grid element, wiring up lazy-load,
    // broken-image cleanup, and click-through to the source link. Shared by the vibe
    // page's inline preview and the daily grid modal.
    function renderImageGrid(gridEl, statusEl, results, query, isStale) {
      gridEl.innerHTML = "";

      if (!results.length) {
        statusEl.textContent = "这组咒语今天装死，去外面继续搜。";
        return;
      }

      statusEl.textContent = "";

      results.forEach((item) => {
        const card = document.createElement("div");
        card.className = "preview-image-card";

        const img = document.createElement("img");
        img.src = item.thumbnail;
        img.alt = item.title || query;
        img.loading = "lazy";
        img.referrerPolicy = "no-referrer";

        img.onerror = () => {
          if (isStale && isStale()) return;
          card.remove();
          if (!gridEl.children.length) {
            statusEl.textContent = "图片跑丢了，但咒语还在。";
          }
        };

        const caption = document.createElement("div");
        caption.className = "preview-image-caption";
        caption.textContent = item.source || "点开看原图";

        if (item.link) {
          card.onclick = () =>
            window.open(item.link, "_blank", "noopener,noreferrer");
        }

        card.appendChild(img);
        card.appendChild(caption);
        gridEl.appendChild(card);
      });

      if (!gridEl.children.length) {
        statusEl.textContent = "图片跑丢了，但咒语还在。";
      }
    }

    async function fetchPreviewImages(query) {
      const statusEl = document.getElementById("preview-image-status");
      const gridEl = document.getElementById("preview-image-grid");

      if (!statusEl || !gridEl) return;

      const requestId = ++previewRequestId;

      statusEl.textContent = "正在召唤氛围图……";
      gridEl.innerHTML = "";

      try {
        const { results } = await fetchPreviewData(query);
        if (requestId !== previewRequestId) return;
        renderImageGrid(gridEl, statusEl, results, query, () => requestId !== previewRequestId);
      } catch (e) {
        if (requestId !== previewRequestId) return;
        statusEl.textContent = "图片跑丢了，但咒语还在。";
      }
    }

    // ---- Daily Star + Vibe preview grid ----
    // Selection tier: "random among acceptable batches" (v0 — see product framing below).
    // A batch = one of a vibe's candidate search queries. The preview-search function
    // already runs a hidden ladder (brave -> serpapi bing/google/yandex fallback) per
    // query and returns filtered, ad/commerce-free results, so acceptability here is
    // just "did that hidden ladder produce enough of a grid to feel worth showing."
    //
    // Random is for flavor; ranking is for breakfast. This selector is intentionally
    // random-among-acceptable for now. To upgrade to ranking later: keep
    // evaluateCandidates() as-is (it's the source of truth for what's acceptable) and
    // replace only pickAcceptableBatch()'s selection strategy with a scorer (e.g. source
    // diversity, freshness, engagement) — no refetching required.
    const MIN_ACCEPTABLE_RESULTS = 7; // mirrors USEFUL_FALLBACK_THRESHOLD in preview-search.js: a grid should feel like a grid, not crumbs.

    function shuffle(arr){
      var a = arr.slice();
      for (var i = a.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
      }
      return a;
    }

    function isAcceptableBatch(results){
      return Array.isArray(results) && results.length >= MIN_ACCEPTABLE_RESULTS;
    }

    // Evaluates every candidate query for a vibe (in random order), skipping any in
    // `exclude`. Returns the full evaluated list (acceptable and not) so the picker can
    // choose among only the acceptable ones without needing to refetch.
    async function evaluateCandidates(queries, exclude){
      var candidates = [];
      var pool = shuffle(queries).filter(function(q){ return !exclude || exclude.indexOf(q) === -1; });
      for (var i = 0; i < pool.length; i++) {
        var q = pool[i];
        try {
          var data = await fetchPreviewData(q);
          candidates.push({ query: q, results: data.results, acceptable: isAcceptableBatch(data.results) });
        } catch (e) {
          candidates.push({ query: q, results: [], acceptable: false });
        }
        // Stop early once we already have a couple of acceptable candidates —
        // no need to burn API calls on every remaining query in the ladder.
        if (candidates.filter(function(c){ return c.acceptable; }).length >= 2) break;
      }
      return candidates;
    }

    function pickAcceptableBatch(candidates){
      var acceptable = candidates.filter(function(c){ return c.acceptable; });
      if (!acceptable.length) return null;
      return acceptable[Math.floor(Math.random() * acceptable.length)];
    }

    async function loadAcceptableBatch(){
      var requestId = ++dailyGridRequestId;
      dailyGridState.loading = true;
      dailyGridState.empty = false;
      renderDailyGridModal();

      var actor = ACTOR_PACKS[dailyGridState.actorIdx];
      var vibe = actor.vibes[dailyGridState.vibeIdx];
      var candidates = await evaluateCandidates(vibe.queries, dailyGridState.triedQueries);
      if (requestId !== dailyGridRequestId) return;

      var chosen = pickAcceptableBatch(candidates);
      if (!chosen) {
        // Every untried query for this vibe came back sparse/junk. Reset the tried
        // list (except keep whatever's currently shown, if anything) so a fresh
        // random pass can retry the full set rather than getting stuck.
        dailyGridState.triedQueries = dailyGridState.chosen ? [dailyGridState.chosen.query] : [];
        dailyGridState.loading = false;
        dailyGridState.empty = true;
        renderDailyGridModal();
        return;
      }

      dailyGridState.triedQueries.push(chosen.query);
      dailyGridState.chosen = chosen;
      dailyGridState.loading = false;
      dailyGridState.empty = false;
      renderDailyGridModal();
    }

      fetchPreviewImages(q);
    }
    
    function clearCustom(){ state.customQuery=null; state.showCustom=false; render(); }
    function toggleMJ(){ state.showMJ=!state.showMJ; var c=document.getElementById('mj-content'),a=document.getElementById('mj-arrow'); if(c)c.style.display=state.showMJ?'block':'none'; if(a)a.textContent=state.showMJ?'▲':'▼'; }
    function copyPrompt(){ var vibe=ACTOR_PACKS[state.actorIdx].vibes[state.vibeIdx]; navigator.clipboard.writeText(vibe.mjPrompt).then(function(){showToast('提示词已复制 ✓');}); }
    function copyShareText(){ var actor=ACTOR_PACKS[state.actorIdx],vibe=actor.vibes[state.vibeIdx]; var text='🖤 姐妹们看这里！！\n\n今天刷的'+actor.name+'氛围太好了，'+vibe.shareFragment+'\n\n'+vibe.emoji+' '+vibe.label+'\n'+vibe.subtitle+'\n\n#'+actor.name+'# #氛围图鉴#'; navigator.clipboard.writeText(text).then(function(){var btn=document.getElementById('share-btn');if(btn){var orig=btn.innerHTML;btn.textContent='✓ 已复制，去安利姐妹吧';setTimeout(function(){btn.innerHTML=orig;},2000);}}); }

    function renderHeader(){ return '<div class="shared-header"><span style="font-size:11px;color:#444;letter-spacing:0.05em;">氛围图鉴</span><button id="lang-toggle">'+(state.showEN?'隐藏英文提示':'显示英文提示')+'</button></div>'; }

    function escapeAttr(str){ if(!str)return ''; return str.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    function renderHome(){
      var h='<div class="page">'+renderHeader();
      h+='<div style="margin-top:32px;text-align:center;">';
      h+='<div style="font-size:22px;font-weight:700;color:#c9a96e;margin-bottom:6px;">今天想看谁？<div class="en-helper">Which one are we summoning today?</div></div>';
      h+='<div style="font-size:13px;color:#555;font-style:italic;margin-bottom:28px;">随便逛逛，随时心动<div class="en-helper">Browse freely. Fall for him anytime.</div></div>';
      h+='<button id="btn-random" class="btn-primary" style="margin-bottom:12px;">✨ 今日随机<div class="en-helper" style="font-weight:400;">Today\'s pick</div></button>';
      h+='<div><button id="btn-daily-grid" class="btn-secondary" style="margin-bottom:28px;">🔮 召唤今日格子<div class="en-helper" style="font-weight:400;">Preview today\'s vibe</div></button></div>';
      h+='</div>';
      for(var i=0;i<ACTOR_PACKS.length;i++){var a=ACTOR_PACKS[i];h+='<div class="actor-card" data-actor="'+i+'" style="background:'+a.cardBg+';border:1px solid '+a.accentColor+'33;"><div><div style="font-size:28px;margin-bottom:6px;">'+a.icon+'</div><div style="font-size:18px;font-weight:700;color:'+a.accentColor+';">'+a.name+'</div><div style="font-size:12px;color:#666;margin-top:2px;">'+a.title+'<div class="en-helper">'+a.title_en+'</div></div></div><span style="color:#444;font-size:18px;">→</span></div>';}
      h+='<div style="text-align:center;color:#2a2a35;font-size:11px;margin-top:40px;">姐妹共享版 · 随时心动</div>';
      h+='<footer style="text-align:center;padding:20px 0 8px;"><span style="font-size:10px;color:#333;">made by the power of friendship</span></footer>';
      h+='</div>'; return h;
    }

    function renderActorPage(){
      var actor=ACTOR_PACKS[state.actorIdx];
      var h='<div class="page">'+renderHeader();
      h+='<button id="btn-back" class="btn-back">← 换一个<span class="en-helper-inline"> · switch actor</span></button>';
      h+='<div style="font-size:22px;font-weight:700;color:'+actor.accentColor+';margin-bottom:4px;">'+actor.title+'<div class="en-helper">'+actor.title_en+'</div></div>';
      h+='<div style="font-size:14px;color:#c9a96e;font-style:italic;margin-bottom:24px;">姐妹今天想看哪种'+actor.shortName+'？<div class="en-helper">Which '+actor.shortName_en+' mood are we feeling today?</div></div>';
      for(var i=0;i<actor.vibes.length;i++){var v=actor.vibes[i];h+='<div class="vibe-card" data-vibe="'+i+'"><div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;"><span style="font-size:22px;">'+v.emoji+'</span><span style="font-size:15px;font-weight:600;">'+v.label+'<span class="en-helper-inline" style="font-size:11px;"> · '+v.label_en+'</span></span></div><div style="font-size:13px;color:#888;font-style:italic;">'+v.subtitle+'<div class="en-helper">'+v.subtitle_en+'</div></div></div>';}
      h+='<div style="text-align:center;font-size:10px;color:#333;margin-top:24px;">三击副标题可自定义关键词 ✦<div class="en-helper">Triple-tap any vibe subtitle to enter custom search mode</div></div>';
      h+='<footer style="text-align:center;padding:20px 0 8px;"><span style="font-size:10px;color:#333;">made by the power of friendship</span></footer>';
      h+='</div>'; return h;
    }

    function renderVibePage(){
      var actor=ACTOR_PACKS[state.actorIdx],vibe=actor.vibes[state.vibeIdx],activeQuery=state.customQuery||vibe.queries[state.queryIdx];
      var h='<div class="page">'+renderHeader();
      h+='<button id="btn-back-vibe" class="btn-back">← 换个心情<span class="en-helper-inline"> · change vibe</span></button>';
      if(state.fromRandom){
        h+='<div class="badge-random">✨ 今日心动推荐</div><br>';
        h+='<div style="font-size:11px;color:#666;margin-bottom:4px;">今日之星：'+actor.name+'<span class="en-helper-inline"> · Today\'s star: '+actor.shortName_en+'</span></div>';
        h+='<div style="font-size:11px;color:#666;margin-bottom:10px;">今日氛围：'+vibe.emoji+' '+vibe.label+'<span class="en-helper-inline"> · Today\'s vibe: '+vibe.label_en+'</span></div>';
      }
      h+='<div style="font-size:12px;color:#555;margin-bottom:8px;">'+actor.name+' · '+vibe.emoji+' '+vibe.label+'</div>';
      h+='<div id="vibe-subtitle" style="font-size:18px;color:'+actor.accentColor+';font-weight:600;line-height:1.5;cursor:pointer;user-select:none;margin-bottom:12px;">'+vibe.subtitle+'<div class="en-helper">'+vibe.subtitle_en+'</div></div>';
      h+='<div id="query-display" style="font-size:13px;color:#444;font-family:monospace;margin-bottom:6px;">🔍 '+activeQuery+(state.customQuery?' · 自定义':'')+'</div>';
      if(vibe.queries.length>1&&!state.customQuery)h+='<div style="font-size:10px;color:#666;margin-bottom:16px;">第 '+(state.queryIdx+1)+' 批 / '+vibe.queries.length+' 批<span class="en-helper-inline"> · Batch '+(state.queryIdx+1)+' of '+vibe.queries.length+'</span></div>';
      h+='<section id="preview-section" class="preview-block">';
      h+='<div class="preview-title">先偷看一眼<div class="en-helper">Take a first peek</div></div>';
      h+='<div class="preview-subtitle">今天先刷这组<div class="en-helper">Start with this batch today</div></div>';
      if(!state.customQuery && vibe.queries.length>1){ h+='<div style="font-size:10px;color:#555;margin-bottom:10px;line-height:1.5;">如果平台装死，点「换一批」换咒语<span class="en-helper-inline"> · If a platform goes quiet, try another spell</span></div>'; }
      h+='<div class="preview-card">';
      h+='<div class="preview-meta"><div class="preview-actor">'+actor.name+'</div><div class="preview-vibe">'+vibe.emoji+' '+vibe.label+'</div></div>';
      h+='<div class="preview-spell"><div class="spell-label">搜索咒语<span class="en-helper-inline"> · Search spell</span></div><div id="preview-query" class="spell-query">'+activeQuery+(state.customQuery?' · 自定义':'')+'</div></div>';
      h+='<div class="preview-cta-row"><button id="preview-open" class="preview-btn">点开看原图<div class="en-helper">Go deeper</div></button><button id="preview-copy" class="preview-btn">复制这句去搜<div class="en-helper">Copy this spell</div></button></div>';
      h+='</div>';
      h+='<p id="preview-image-status" class="preview-status"></p>';
      h+='<div id="preview-image-grid" class="preview-image-grid"></div>';
      h+='</section>';
      h+='<div id="external-search-section" style="font-size:11px;color:#555;margin-bottom:8px;">去外面继续搜 →<span class="en-helper-inline"> · Continue outside</span></div>';
      h+='<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px;">';
      h+='<a href="'+weiboUrl(activeQuery)+'" target="_blank" rel="noopener noreferrer" class="btn-platform platform-link" style="background:#e6162d;">微博搜图<div class="en-helper">Search Weibo</div></a>';
      h+='<a href="'+baiduImageUrl(activeQuery)+'" target="_blank" rel="noopener noreferrer" class="btn-platform platform-link" style="background:#2932e1;">百度图片<div class="en-helper">Baidu Images</div></a>';
      h+='<a href="'+googleUrl(activeQuery)+'" target="_blank" rel="noopener noreferrer" class="btn-platform platform-link" style="background:#1a1a26;border:1px solid #333;">Google 图片<div class="en-helper">Google Images</div></a>';
      h+='<a href="'+pinterestUrl(activeQuery)+'" target="_blank" rel="noopener noreferrer" class="btn-platform platform-link" style="background:#e60023;">Pinterest</a>';
      h+='<a href="'+tumblrUrl(activeQuery)+'" target="_blank" rel="noopener noreferrer" class="btn-platform platform-link" style="background:#36465d;">Tumblr</a>';
      h+='<button id="btn-copy-query" class="btn-platform" style="background:#1e1e28;border:1px solid #2a2a35;color:#888;">复制搜索词<div class="en-helper">Copy search phrase</div></button>';
      h+='</div>';
      var refreshLabel=state.customQuery?'切回系统关键词':'🔄 换一批',refreshEN=state.customQuery?'Return to preset keywords':'Try another batch';
      h+='<button id="refresh-btn" class="btn-secondary" style="width:100%;margin-bottom:20px;">'+refreshLabel+'<div class="en-helper">'+refreshEN+'</div></button>';
      h+='<div id="advanced-section" style="display:'+(state.showCustom?'block':'none')+';background:#0a0a12;border:1px solid #2a2a35;border-radius:8px;padding:14px;margin-bottom:20px;">';
      h+='<div style="font-size:12px;color:#c9a96e;margin-bottom:8px;">自定义关键词 ✦ 高级模式<div class="en-helper">Custom keywords · advanced mode</div></div>';
      h+='<input id="custom-input" type="text" value="'+escapeAttr(state.customQuery||activeQuery)+'" placeholder="输入你的搜图关键词" style="width:100%;background:#14141a;color:#f0ede8;border:1px solid #2a2a35;border-radius:6px;padding:10px 12px;font-size:13px;margin-bottom:6px;box-sizing:border-box;" />';
      h+='<div style="font-size:11px;color:#444;margin-bottom:10px;">修改后点任意搜图按钮生效<div class="en-helper">Your phrase goes live when you tap any search button above</div></div>';
      h+='<button id="btn-clear-custom" style="background:transparent;border:none;color:#555;font-size:12px;cursor:pointer;padding:0;">✕ 关闭并清除<span class="en-helper-inline"> · Close &amp; clear</span></button>';
      h+='</div>';
      if(vibe.mjPrompt){
        h+='<div style="border:1px solid #2a2a35;border-radius:8px;overflow:hidden;margin-bottom:20px;">';
        h+='<button id="btn-mj-toggle" style="width:100%;background:#14141a;color:#c9a96e;font-size:13px;padding:12px 16px;border:none;cursor:pointer;text-align:left;display:flex;justify-content:space-between;align-items:center;"><span>✨ Midjourney 出图提示词<span class="en-helper-inline" style="font-size:10px;color:#555;"> · prompt</span></span><span id="mj-arrow">'+(state.showMJ?'▲':'▼')+'</span></button>';
        h+='<div id="mj-content" style="display:'+(state.showMJ?'block':'none')+';background:#0e0e12;padding:14px;">';
        h+='<textarea readonly style="width:100%;background:#14141a;color:#c9a96e;border:1px solid #2a2a35;border-radius:6px;padding:10px;font-size:11.5px;font-family:monospace;line-height:1.6;resize:none;box-sizing:border-box;min-height:100px;">'+vibe.mjPrompt+'</textarea>';
        h+='<div style="display:flex;gap:8px;margin-top:10px;"><button id="btn-copy-prompt" class="btn-primary" style="flex:1;font-size:13px;">复制提示词<span class="en-helper-inline"> · Copy prompt</span></button><a href="https://www.midjourney.com/imagine" target="_blank" rel="noopener noreferrer" class="btn-secondary" style="flex:1;text-align:center;text-decoration:none;display:flex;align-items:center;justify-content:center;">打开 Midjourney ↗</a></div>';
        h+='</div></div>';
      }
      h+='<button id="share-btn" class="btn-primary" style="width:100%;margin-bottom:8px;">一键复制文案<div class="en-helper" style="font-weight:400;">Copy Weibo-ready caption</div></button>';
      h+='<div style="text-align:center;font-size:10px;color:#333;margin-top:8px;">三击副标题可自定义关键词 ✦<div class="en-helper">Triple-tap the subtitle to enter custom keyword mode</div></div>';
      h+='<footer style="text-align:center;padding:20px 0 8px;"><span style="font-size:10px;color:#333;">made by the power of friendship</span></footer>';
      h+='</div>'; return h;
    }

    function render(){ var app=document.getElementById('app'); var html=''; if(state.page==='home')html=renderHome(); else if(state.page==='actor')html=renderActorPage(); else if(state.page==='vibe')html=renderVibePage(); app.innerHTML=html; bindEvents(); var vibe; if(state.page==='vibe') { vibe=ACTOR_PACKS[state.actorIdx] && ACTOR_PACKS[state.actorIdx].vibes[state.vibeIdx]; if(vibe) { var activeQuery=state.customQuery||vibe.queries[state.queryIdx]; fetchPreviewImages(activeQuery); } } }

    function bindEvents(){
      var langBtn=document.getElementById('lang-toggle'); if(langBtn)langBtn.addEventListener('click',toggleLang);
      if(state.page==='home'){
        var rb=document.getElementById('btn-random'); if(rb)rb.addEventListener('click',goRandom);
        var dgb=document.getElementById('btn-daily-grid'); if(dgb)dgb.addEventListener('click',openDailyGridModal);
        document.querySelectorAll('.actor-card').forEach(function(c){c.addEventListener('click',function(){goActor(parseInt(c.getAttribute('data-actor')));});});
      }
      if(state.page==='actor'){
        var bb=document.getElementById('btn-back'); if(bb)bb.addEventListener('click',goHome);
        document.querySelectorAll('.vibe-card').forEach(function(c){c.addEventListener('click',function(){goVibe(parseInt(c.getAttribute('data-vibe')));});});
      }
      if(state.page==='vibe'){
        var bv=document.getElementById('btn-back-vibe'); if(bv)bv.addEventListener('click',function(){goActor();});
        var sub=document.getElementById('vibe-subtitle'); if(sub)sub.addEventListener('click',handleSubtitleClick);
        var rfb=document.getElementById('refresh-btn'); if(rfb)rfb.addEventListener('click',handleRefresh);
        var ci=document.getElementById('custom-input'); if(ci)ci.addEventListener('input',function(){handleCustomInput(this.value);});
        var cc=document.getElementById('btn-clear-custom'); if(cc)cc.addEventListener('click',clearCustom);
        var mjt=document.getElementById('btn-mj-toggle'); if(mjt)mjt.addEventListener('click',toggleMJ);
        var cp=document.getElementById('btn-copy-prompt'); if(cp)cp.addEventListener('click',copyPrompt);
        var sb=document.getElementById('share-btn'); if(sb)sb.addEventListener('click',copyShareText);
        function copyActiveQuery(){
          var vibe=ACTOR_PACKS[state.actorIdx]&&ACTOR_PACKS[state.actorIdx].vibes[state.vibeIdx];
          var q=state.customQuery||(vibe?vibe.queries[state.queryIdx]:'');
          if(!q)return;
          if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(q).then(function(){showToast('搜索词已复制 ✓');});}
          else{var ta=document.createElement('textarea');ta.value=q;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast('搜索词已复制 ✓');}
        }
        var cq=document.getElementById('btn-copy-query'); if(cq)cq.addEventListener('click',copyActiveQuery);
        var pc=document.getElementById('preview-copy'); if(pc)pc.addEventListener('click',copyActiveQuery);
        var po=document.getElementById('preview-open'); if(po)po.addEventListener('click',function(){var target=document.getElementById('external-search-section'); if(target)target.scrollIntoView({behavior:'smooth',block:'start'});});
      }
    }

    render();
  </script>
</body>
</html>
